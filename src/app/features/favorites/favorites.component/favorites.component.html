<section class="favorites">
  <div class="favorites__header">
    <p class="favorites__eyebrow">Tu colección</p>
    <h1>Favoritos</h1>
    <p>
      Aquí aparecen las películas y series que has guardado durante tu búsqueda.
    </p>
  </div>

  <div *ngIf="favorites.length === 0" class="favorites__empty">
    <div class="favorites__icon">❤️</div>
    <h2>Aún no tienes favoritos</h2>
    <p>Explora películas o series y guarda las que más te interesen.</p>

    <a routerLink="/" class="favorites__button">
      Buscar contenido
    </a>
  </div>

  <section *ngIf="favorites.length > 0" class="favorites__grid">
    <app-movie-card
      *ngFor="let movie of favorites"
      [movie]="movie"
      [isFavorite]="isFavorite(movie.id)"
      (favoriteToggle)="toggleFavorite(movie)"
    ></app-movie-card>
  </section>
</section>
